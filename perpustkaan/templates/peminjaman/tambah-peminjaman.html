{% extends 'base.html' %}

{% block content %}
<div class="mb-6 flex items-center space-x-3">
    <a href="{% url 'peminjaman_list' %}" class="text-gray-400 hover:text-gray-600 transition text-lg"><i class="fa-solid fa-arrow-left"></i></a>
    <div>
        <p class="text-sm text-gray-500">Peminjaman Buku</p>
        <h2 class="text-2xl font-bold text-gray-800">Pinjam Buku</h2>
    </div>
</div>

<div class="bg-white rounded-2xl shadow-xs border border-gray-100 p-8 max-w-4xl">
    <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Nama Peminjam</label>
                <select name="siswa_id" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-500 text-sm bg-white text-gray-700">
                    <option value="" disabled selected>Pilih Anggota Siswa</option>
                    {% for siswa in siswa_list %}
                        <option value="{{ siswa.id }}">{{ siswa.nama }} - {{ siswa.kelas }} ({{ siswa.nis }})</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Pilih Buku</label>
                <select name="buku_id" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-500 text-sm bg-white text-gray-700">
                    <option value="" disabled selected>Pilih Judul Buku</option>
                    {% for buku in buku_list %}
                        <option value="{{ buku.id }}">{{ buku.judul }} ({{ buku.stok }} stok)</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Tanggal Pinjam</label>
                <input type="date" name="tanggal_pinjam" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-500 text-sm text-gray-600">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Tanggal Jatuh Tempo</label>
                <input type="date" name="jatuh_tempo" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-500 text-sm text-gray-600">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Keperluan</label>
                <select name="keperluan" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-500 text-sm bg-white text-gray-700">
                    <option value="Bacaan pribadi">Bacaan pribadi</option>
                    <option value="Tugas sekolah">Tugas sekolah</option>
                    <option value="Referensi kelompok">Referensi kelompok</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Petugas</label>
                <input type="text" value="Budi Siregar" disabled class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 text-gray-400 text-sm font-medium focus:outline-none">
            </div>
            <div class="col-span-2">
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Catatan</label>
                <textarea name="catatan" rows="4" placeholder="Contoh: buku untuk tugas Bahasa Indonesia" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-500 text-sm placeholder-gray-300"></textarea>
            </div>
        </div>

        <div class="flex justify-end space-x-3 pt-4 border-t border-gray-100">
            <a href="{% url 'peminjaman_list' %}" class="px-5 py-2.5 rounded-xl border border-gray-200 text-gray-500 hover:bg-gray-50 font-medium text-sm transition">Batal</a>
            <button type="submit" class="px-5 py-2.5 rounded-xl bg-[#2563EB] hover:bg-blue-700 text-white font-medium text-sm transition">Pinjam Buku</button>
        </div>
    </form>
</div>
{% endblock %}
