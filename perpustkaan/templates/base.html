<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPUSTAKA - Sistem Peminjaman Buku</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex">

    <aside class="w-64 bg-[#0B0F19] text-slate-300 flex flex-col justify-between p-6 shrink-0 border-r border-slate-900 shadow-xl fixed h-screen z-20">
        <div>
            <div class="flex items-center space-x-3 mb-10 mt-2">
                <div class="bg-[#2563EB] text-white rounded-full w-10 h-10 flex items-center justify-center font-bold text-xl shadow-lg shadow-blue-600/20">
                    P
                </div>
                <div>
                    <p class="text-[10px] tracking-widest uppercase text-slate-500 font-extrabold">Sipustaka</p>
                    <h1 class="text-sm font-bold text-white leading-tight">Sistem Peminjaman<br>Buku</h1>
                </div>
            </div>

            <nav class="space-y-1.5">
                <a href="{% url 'dashboard' %}" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-semibold transition group {% if request.resolver_match.url_name == 'dashboard' %} bg-slate-800/60 text-white {% else %} text-slate-400 hover:bg-slate-900 hover:text-slate-200 {% endif %}">
                    <i class="fa-solid fa-table-columns text-base w-5 text-center"></i>
                    <span>Dashboard</span>
                </a>

                <a href="{% url 'buku_list' %}" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-semibold transition group {% if 'buku' in request.path %} bg-slate-800/60 text-white {% else %} text-slate-400 hover:bg-slate-900 hover:text-slate-200 {% endif %}">
                    <i class="fa-solid fa-book text-base w-5 text-center"></i>
                    <span>Buku</span>
                </a>

                <a href="{% url 'peminjaman_list' %}" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-semibold transition group {% if 'peminjaman' in request.path %} bg-slate-800/60 text-white {% else %} text-slate-400 hover:bg-slate-900 hover:text-slate-200 {% endif %}">
                    <i class="fa-solid fa-receipt text-base w-5 text-center"></i>
                    <span>Peminjaman</span>
                </a>

                <a href="{% url 'siswa_list' %}" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-semibold transition group {% if 'siswa' in request.path or 'user' in request.path %} bg-slate-800/60 text-white {% else %} text-slate-400 hover:bg-slate-900 hover:text-slate-200 {% endif %}">
                    <i class="fa-solid fa-user-group text-base w-5 text-center"></i>
                    <span>User</span>
                </a>
            </nav>
        </div>

        <div class="bg-slate-900/60 border border-slate-800/50 p-4 rounded-2xl flex flex-col justify-center">
            <p class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Admin Aktif</p>
            <p class="text-sm font-bold text-white mt-0.5">Budi Siregar</p>
        </div>
    </aside>

    <main class="flex-1 pl-64 min-h-screen flex flex-col">
        <div class="p-8 md:p-10 flex-1 flex flex-col max-w-7xl w-full mx-auto">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</body>
</html>
