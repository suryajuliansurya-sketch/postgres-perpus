{% extends 'base.html' %}

{% block content %}
<div class="mb-6 flex items-center space-x-3">
    <a href="{% url 'siswa_list' %}" class="text-gray-400 hover:text-gray-600 transition text-lg"><i class="fa-solid fa-arrow-left"></i></a>
    <div>
        <p class="text-sm text-gray-500">Kelola User</p>
        <h2 class="text-2xl font-bold text-gray-800">Tambah User</h2>
    </div>
</div>

<div class="bg-white rounded-2xl shadow-xs border border-gray-100 p-8 max-w-4xl">
    <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Nama</label>
                <input type="text" name="nama" placeholder="Masukkan nama lengkap" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-500 text-sm text-gray-700 placeholder-gray-300">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Kelas</label>
                <input type="text" name="kelas" placeholder="Contoh: XI IPA 1" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-500 text-sm text-gray-700 placeholder-gray-300">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">NIS</label>
                <input type="text" name="nis" placeholder="Contoh: 2026001" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-500 text-sm text-gray-700 placeholder-gray-300">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Status</label>
                <select name="is_active" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-500 text-sm bg-white text-gray-700">
                    <option value="true" selected>Aktif</option>
                    <option value="false">Nonaktif</option>
                </select>
            </div>
        </div>

        <div class="flex justify-end space-x-3 pt-4 border-t border-gray-100">
            <a href="{% url 'siswa_list' %}" class="px-5 py-2.5 rounded-xl border border-gray-200 text-gray-500 hover:bg-gray-50 font-medium text-sm transition">Batal</a>
            <button type="submit" class="px-5 py-2.5 rounded-xl bg-[#2563EB] hover:bg-blue-700 text-white font-medium text-sm transition">Tambah User</button>
        </div>
    </form>
</div>
{% endblock %}
