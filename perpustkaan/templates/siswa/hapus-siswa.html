{% extends 'base.html' %}

{% block content %}
<div class="mb-6 flex items-center space-x-3">
    <a href="{% url 'siswa_list' %}" class="text-gray-400 hover:text-gray-600 transition text-lg"><i class="fa-solid fa-arrow-left"></i></a>
    <div>
        <p class="text-sm text-gray-500">Kelola User</p>
        <h2 class="text-2xl font-bold text-gray-800">Hapus User</h2>
    </div>
</div>

<div class="bg-white rounded-2xl shadow-xs border border-gray-100 p-8 max-w-xl">
    <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div>
            <p class="text-sm text-gray-400 font-medium mb-1">Anda akan menghapus:</p>
            <h3 class="text-xl font-bold text-gray-800 mb-2">{{ siswa.nama }}</h3>
            <p class="text-sm text-gray-400 leading-relaxed">
                Data user akan dihapus dari daftar anggota perpustakaan.
            </p>
        </div>

        <div class="flex justify-end space-x-3 pt-4 border-t border-gray-100">
            <a href="{% url 'siswa_list' %}" class="px-5 py-2.5 rounded-xl border border-gray-200 text-gray-500 hover:bg-gray-50 font-medium text-sm transition">Batal</a>
            <button type="submit" class="px-5 py-2.5 rounded-xl bg-[#EF4444] hover:bg-red-600 text-white font-bold text-sm transition">
                Hapus
            </button>
        </div>
    </form>
</div>
{% endblock %}
